name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity-service, student-service, enrollment-service, billing-service]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # CI-only placeholder — NOT the real shared secret from backend/*/.env.
      SECRET_KEY: ci-only-secret-key-not-for-production
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirments.txt

      - name: Django system check
        working-directory: backend/${{ matrix.service }}
        run: python manage.py check

      # Only identity-service and billing-service have real test files so
      # far (see Phase D of the improvement plan) — the other two run the
      # system check above until tests are added for them too.
      - name: Run tests
        if: matrix.service == 'identity-service' || matrix.service == 'billing-service'
        working-directory: backend/${{ matrix.service }}
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/admin-portal/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
